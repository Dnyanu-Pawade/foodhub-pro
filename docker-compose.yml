version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: foodhub-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: foodhub_db
      MYSQL_USER: foodhub
      MYSQL_PASSWORD: ${DB_PASSWORD:-foodhub123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: foodhub-backend
    ports:
      - "8082:8082"
    environment:
      PORT: 8082
      DB_URL: jdbc:mysql://mysql:3306/foodhub_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: foodhub
      DB_PASSWORD: ${DB_PASSWORD:-foodhub123}
      JWT_SECRET: ${JWT_SECRET:-FoodHubProSecretKey2024VeryLongSecureKeyForJWT!@#}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-your_key_id}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-your_key_secret}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-your_account_sid}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-your_auth_token}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-+1234567890}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY:-your_access_key}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY:-your_secret_key}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-foodhub-images}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: foodhub-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
