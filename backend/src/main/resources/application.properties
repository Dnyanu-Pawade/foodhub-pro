# ── Server ──────────────────────────────────────────────────────────────────
server.port=${PORT:8082}

# ── MySQL ────────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/foodhub_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:your_db_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── Disable Redis autoconfiguration (enable when configured) ───────────
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# ── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:FoodHubProSecretKey2024VeryLongSecureKeyForJWT!@#$%^&*()}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# ── AWS S3 ───────────────────────────────────────────────────────────────────
aws.s3.bucket=${AWS_S3_BUCKET:foodhub-images}
aws.s3.region=${AWS_REGION:ap-south-1}
aws.access-key=${AWS_ACCESS_KEY:your_access_key}
aws.secret-key=${AWS_SECRET_KEY:your_secret_key}

# ── Razorpay ─────────────────────────────────────────────────────────────────
razorpay.key-id=${RAZORPAY_KEY_ID:your_key_id}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:your_key_secret}

# ── Twilio SMS ───────────────────────────────────────────────────────────────
twilio.account-sid=${TWILIO_ACCOUNT_SID:your_account_sid}
twilio.auth-token=${TWILIO_AUTH_TOKEN:your_auth_token}
twilio.phone-number=${TWILIO_PHONE_NUMBER:+1234567890}

# ── Mail (Gmail SMTP — set env vars to enable) ───────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# ── Springdoc / Swagger ──────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── File Upload ──────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── App ──────────────────────────────────────────────────────────────────────
app.base-url=${APP_BASE_URL:http://localhost:8082}
app.upload-dir=${UPLOAD_DIR:uploads}

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.foodhub=INFO
logging.level.org.springframework.security=WARN

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=FoodHub Pro
info.app.version=1.0.0
