events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml application/xml;

    upstream backend {
        server backend:8082;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name foodhubpro.in www.foodhubpro.in;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name foodhubpro.in www.foodhubpro.in;

        ssl_certificate     /etc/letsencrypt/live/foodhubpro.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/foodhubpro.in/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin";
        add_header Permissions-Policy "geolocation=(self), camera=(self)";

        # API proxy
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # WebSocket
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # Swagger
        location /swagger-ui/ { proxy_pass http://backend; }
        location /api-docs/    { proxy_pass http://backend; }

        # Actuator (restrict to internal)
        location /actuator/ {
            proxy_pass http://backend;
            allow 127.0.0.1;
            deny all;
        }

        # React SPA — served by Spring Boot
        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
