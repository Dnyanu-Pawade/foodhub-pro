<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FoodHub Pro — Order Food, Groceries & More</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f97316" />

    <!-- Primary SEO -->
    <meta name="description" content="Order food, groceries & pharmacy items delivered to your door in 30 minutes. 500+ restaurants, live GPS tracking, loyalty rewards." />
    <meta name="keywords" content="food delivery, order food online, restaurant delivery, groceries delivery, FoodHub Pro" />
    <meta name="author" content="FoodHub Pro" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://foodhubpro.in" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://foodhubpro.in" />
    <meta property="og:title" content="FoodHub Pro — Delicious food, delivered fast" />
    <meta property="og:description" content="Order from 500+ restaurants, grocery stores & pharmacies. Live GPS tracking, loyalty rewards, and table booking — all in one app." />
    <meta property="og:image" content="https://foodhubpro.in/og-image.png" />
    <meta property="og:site_name" content="FoodHub Pro" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://foodhubpro.in" />
    <meta name="twitter:title" content="FoodHub Pro — Delicious food, delivered fast" />
    <meta name="twitter:description" content="Order from 500+ restaurants. Live GPS tracking, loyalty rewards, table booking." />
    <meta name="twitter:image" content="https://foodhubpro.in/og-image.png" />

    <!-- PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FoodHub Pro" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "FoodHub Pro",
      "url": "https://foodhubpro.in",
      "description": "Order food, groceries & pharmacy items delivered to your door in 30 minutes.",
      "applicationCategory": "FoodDelivery",
      "operatingSystem": "Web, Android, iOS",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "INR" }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
